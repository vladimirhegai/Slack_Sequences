# metric-odometer — masked digit columns, wave landing, accent lock

**What it is.** A hero metric built from real odometer machinery: each digit
of the final figure is a masked vertical column that spins through a full
digit cycle and decelerates onto its target, landing in a left-to-right wave.
Separators (`.`, `,`, `:`) stay printed while digits move. The lock is
acknowledged by an accent underline sweep, one committed scale pop, and a soft
glow that releases. The label reads beneath the number the whole time, so the
claim has context while the digits are still rolling.

**When to declare it.** The brief's proof moment: an uptime/accuracy
percentage, revenue or user count, latency figure, a multiplier — any single
number the film hangs its credibility on. The landing is a natural PRIMARY
moment: place a declared moment at roughly `sceneStart + settleSec` with
motionIntent "count" or "resolve". Prefer it over a plain `count` beat when
the number IS the shot (a `stat-card` count suits dashboards; this suits hero
typography).

**How to stage the shot around it.**
- Give the roll its focal window: the columns spin from `settleSec - 1.2` to
  `settleSec`; no competing motion there, and ≥1s of read after the lock.
- Calm or slowly drifting camera; a push-in that lands just before the lock
  pairs beautifully. Avoid whipping away before the underline finishes.
- The number reads as the scene's hero copy — keep other copy small and
  out of the center band.
- `value` is at most 6 characters with one separator; put units in `suffix`
  ("%", "ms", "x") and currency/sign in `prefix` ("$", "+").

**Slots.** `value` (the final figure — digits roll, separators print),
`label` (what it measures), `prefix`/`suffix` (static accent-colored unit
marks), `accent` (a `var(--…)` brand token), `settleSec` (seconds after scene
start when the last digit locks; leave ≥1s of scene after it).

<script data-recipe-motion>
  // Load-time column distribution: runs once at document parse, before any
  // seek — a pure function of {{value}}. Digit chars keep their strip,
  // separators print, unused columns hide.
  var cells = document.querySelectorAll('[data-part="{{uid}}-odometer"] .rcp-odo-cell');
  for (var i = 0; i < cells.length; i++) {
    var ch = "{{value}}".charAt(i);
    var strip = cells[i].querySelector(".rcp-odo-strip");
    var lit = cells[i].querySelector(".rcp-odo-lit");
    if (!ch) { cells[i].style.display = "none"; }
    else if (ch >= "0" && ch <= "9") { lit.style.display = "none"; }
    else { strip.style.display = "none"; lit.textContent = ch; }
  }

  // Roll targets: each strip is 20 lines (0-9 twice), one line = 5% of strip
  // height; a digit d lands on its second copy at yPercent -5*(10+d), so
  // every live column travels at least one full cycle. Non-digit columns
  // resolve to 0 (their strip is hidden anyway).
  var c0 = "{{value}}".charCodeAt(0); var y0 = (c0 >= 48 && c0 <= 57) ? (-5 * (c0 - 38)) : 0;
  var c1 = "{{value}}".charCodeAt(1); var y1 = (c1 >= 48 && c1 <= 57) ? (-5 * (c1 - 38)) : 0;
  var c2 = "{{value}}".charCodeAt(2); var y2 = (c2 >= 48 && c2 <= 57) ? (-5 * (c2 - 38)) : 0;
  var c3 = "{{value}}".charCodeAt(3); var y3 = (c3 >= 48 && c3 <= 57) ? (-5 * (c3 - 38)) : 0;
  var c4 = "{{value}}".charCodeAt(4); var y4 = (c4 >= 48 && c4 <= 57) ? (-5 * (c4 - 38)) : 0;
  var c5 = "{{value}}".charCodeAt(5); var y5 = (c5 >= 48 && c5 <= 57) ? (-5 * (c5 - 38)) : 0;

  // Timing spine: {{start}}/{{settleSec}} are numeric literals, so every
  // position below constant-folds at parse time (lint-placeable, identical
  // at runtime). settle = the last column's lock.
  var settle = {{start}} + {{settleSec}};

  // Entrance: the whole metric block rises as one object (label included, so
  // the claim has context while the digits roll).
  tl.fromTo('[data-part="{{uid}}-odometer"]', { y: 26, opacity: 0 },
    { y: 0, opacity: 1, duration: 0.45, ease: "power3.out" }, {{start}} + 0.15);

  // The roll: all columns spin together, decelerating on seqSettle, landing
  // in a left-to-right wave (each column starts a touch later and rolls a
  // touch longer than its left neighbor).
  tl.fromTo('[data-part="{{uid}}-odo-0"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y0, duration: 0.95, ease: "seqSettle" }, settle - 1.20);
  tl.fromTo('[data-part="{{uid}}-odo-1"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y1, duration: 0.97, ease: "seqSettle" }, settle - 1.17);
  tl.fromTo('[data-part="{{uid}}-odo-2"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y2, duration: 0.99, ease: "seqSettle" }, settle - 1.14);
  tl.fromTo('[data-part="{{uid}}-odo-3"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y3, duration: 1.01, ease: "seqSettle" }, settle - 1.11);
  tl.fromTo('[data-part="{{uid}}-odo-4"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y4, duration: 1.03, ease: "seqSettle" }, settle - 1.08);
  tl.fromTo('[data-part="{{uid}}-odo-5"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y5, duration: 1.05, ease: "seqSettle" }, settle - 1.05);

  // Lock acknowledgment: one committed pop, underline sweep, glow release.
  tl.fromTo('[data-part="{{uid}}-odometer"] .rcp-odo-numwrap', { scale: 1 },
    { scale: 1.02, duration: 0.12, ease: "power2.out" }, settle - 0.03);
  tl.to('[data-part="{{uid}}-odometer"] .rcp-odo-numwrap', { scale: 1, duration: 0.28, ease: "seqSettle" }, settle + 0.11);
  tl.fromTo('[data-part="{{uid}}-odometer"] .rcp-odo-rule', { scaleX: 0 },
    { scaleX: 1, duration: 0.32, ease: "power3.out" }, settle + 0.04);
  tl.fromTo('[data-part="{{uid}}-odometer"] .rcp-odo-glow', { opacity: 0 },
    { opacity: 0.45, duration: 0.22, ease: "power2.out" }, settle - 0.02);
  tl.to('[data-part="{{uid}}-odometer"] .rcp-odo-glow', { opacity: 0.16, duration: 0.5, ease: "power2.inOut" }, settle + 0.24);
