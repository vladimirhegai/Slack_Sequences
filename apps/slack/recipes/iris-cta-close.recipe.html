# iris-cta-close — accent iris flood, CTA ignition, supporting line

**What it is.** The film's closing gesture: a kicker line and a ghost
(outlined) CTA pill hold the frame; an accent ring pulses once, then an accent
iris disc floods outward from behind the pill — its crisp edge sweeps past the
frame and relaxes into a subtle accent tint over the canvas. At the landing
the pill ignites to solid accent with dark ink copy and one committed pop, and
the reassurance line settles beneath. It exists because model-authored end
cards reliably ship small, timid CTAs on empty canvases; this pattern makes
the close the biggest moment of the film by construction.

**When to declare it.** Any brief that ends on a call to action, sign-up,
trial, install, or "get started" — the DEFAULT close for launch and feature
films. Declare it in the FINAL scene. The ignition is a natural PRIMARY
moment: place a declared moment at roughly `sceneStart + settleSec` with
motionIntent "resolve" or "press".

**How to stage the shot around it.**
- Final scene, calm camera: `hold` or a slow `drift`; the iris supplies the
  scene's energy. Never whip away after the ignition — leave ≥1s of read.
- The pattern owns the frame center; keep other content off the scene or in
  the margins (a small logo top-left is fine).
- The iris flood reads best arriving from a darker canvas; pair naturally
  with a warming `gradeShift` or a `flash`-free hard cut in.
- Copy discipline: `label` is the action ("Start free trial"), `sub` removes
  the friction ("no credit card"), `kicker` frames the ask.

**Slots.** `kicker` (line above), `label` (button copy — the ask), `sub`
(reassurance under the button), `accent` (a `var(--…)` brand token; vivid
tokens read best — the ignited button uses near-black ink on it),
`settleSec` (seconds after scene start when the iris lands and the button
ignites; leave ≥1s of scene after it).

<script data-recipe-motion>
  // Timing spine: {{start}}/{{settleSec}} are numeric literals, so every
  // position below constant-folds at parse time (lint-placeable, identical at
  // runtime). settle = the iris landing / button ignition.
  var settle = {{start}} + {{settleSec}};

  // Entrance: kicker, then the ghost pill.
  tl.fromTo('[data-part="{{uid}}-cta"] .rcp-cta-kicker', { y: 18, opacity: 0 },
    { y: 0, opacity: 1, duration: 0.4, ease: "power3.out" }, {{start}} + 0.15);
  tl.fromTo('[data-part="{{uid}}-cta"] .rcp-cta-pill', { y: 20, opacity: 0, scale: 0.97 },
    { y: 0, opacity: 1, scale: 1, duration: 0.45, ease: "power3.out" }, {{start}} + 0.32);

  // Anticipation ring: one clean pulse announcing the flood.
  // immediateRender:false — this fromTo's FROM state is VISIBLE (opacity
  // 0.55); without it GSAP paints that state at timeline build, parking a
  // ghost ring on the frame from scene start. CSS rest (opacity 0) rules
  // until the pulse begins.
  tl.fromTo('[data-part="{{uid}}-cta"] .rcp-cta-ring', { scale: 0.55, opacity: 0.55 },
    { scale: 1.5, opacity: 0, duration: 0.55, ease: "power2.out", immediateRender: false },
    settle - 0.62);

  // The iris: a crisp accent edge sweeps past the frame, relaxing to a tint
  // so every pre-flood copy color stays valid on the landed canvas.
  // (immediateRender:false for the same reason — its from-opacity is 0.85;
  // scale 0 happens to hide it, but the rest state belongs to the CSS.)
  tl.fromTo('[data-part="{{uid}}-cta"] .rcp-cta-iris', { scale: 0, opacity: 0.85 },
    { scale: 1, opacity: 0.16, duration: 0.5, ease: "seqSwoosh", immediateRender: false },
    settle - 0.5);

  // Ignition: the pill fills accent, ink label crossfades in, ghost releases.
  tl.fromTo('[data-part="{{uid}}-cta"] .rcp-cta-fill', { opacity: 0 },
    { opacity: 1, duration: 0.16, ease: "power2.out" }, settle);
  tl.fromTo('[data-part="{{uid}}-cta"] .rcp-cta-label-lit', { opacity: 0 },
    { opacity: 1, duration: 0.16, ease: "power2.out" }, settle);
  tl.to('[data-part="{{uid}}-cta"] .rcp-cta-label-ghost', { opacity: 0, duration: 0.12, ease: "power1.out" }, settle);

  // One committed pop (no wobble), then the reassurance line settles.
  tl.fromTo('[data-part="{{uid}}-cta"] .rcp-cta-pill', { scale: 1 },
    { scale: 1.05, duration: 0.12, ease: "power2.out" }, settle + 0.01);
  tl.to('[data-part="{{uid}}-cta"] .rcp-cta-pill', { scale: 1, duration: 0.3, ease: "seqSettle" }, settle + 0.15);
  tl.fromTo('[data-part="{{uid}}-cta"] .rcp-cta-sub', { y: 14, opacity: 0 },
    { y: 0, opacity: 0.9, duration: 0.4, ease: "power3.out" }, settle + 0.22);
</script>
