<template data-recipe-doc>
# last-word-roulette — locked sentence, final-word wheel, payoff snap

**What it is.** A hero headline whose sentence is locked while its final word
is a masked vertical roulette: three candidate words tick past in committed
steps, then the payoff word snaps in on a settle ease, an accent underline
draws beneath it, and a soft glow acknowledges the landing before releasing.

**When to declare it.** The brief positions the product against alternatives,
cycles through options, or builds to one decisive word — "everything becomes
___", "stop guessing, start ___", pricing/persona/verb roulettes, hook shots
that need a typographic signature, or a resolve shot that lands the thesis
word. The payoff landing is a natural PRIMARY moment: place a declared moment
at roughly `sceneStart + settleSec` with motionIntent "type-on" or "resolve".

**How to stage the shot around it.**
- Give the wheel its focal window: no competing motion from `settleSec - 1.5`
  until ~1s after the payoff (the pattern owns the eye through the snap).
- The sentence reads best as the scene's hero copy on a calm or slowly
  drifting camera; a whip INTO the scene works, a whip away before the payoff
  has ~1s of reading room does not.
- Pair naturally: a `timeRamp` dip at the payoff, a `gradeShift` warming at
  the landing, or a cut whose continuity anchor is the underlined word.
- The candidates should escalate toward the payoff (weakest first); keep all
  four words in one register (verbs with verbs, nouns with nouns).

**Slots.** `lead` (the locked sentence prefix), `word1..word3` (the candidate
ticks), `payoff` (the word that stays), `accent` (a `var(--…)` brand token for
the wheel/underline/glow), `settleSec` (seconds after scene start when the
payoff locks — leave ≥1s of scene after it).

<script data-recipe-motion>
  // Timing spine: everything is derived from the scene window and the single
  // settleSec knob (seconds after scene start when the payoff locks), so a
  // re-timed scene keeps the choreography's shape. Clamped so the full
  // gesture always fits the scene with a reading hold after the payoff.
  var settle = start + Math.min(Math.max({{settleSec}}, 1.6), Math.max(1.6, duration - 1.0));
  var rootSel = '[data-part="' + uid + '-roulette"]';
  var wheelSel = '[data-part="' + uid + '-wheel"]';
  var ruleSel = rootSel + " .rcp-rule";
  var glowSel = rootSel + " .rcp-glow";

  // Entrance: the locked sentence rises in as one object.
  tl.fromTo(rootSel, { y: 26, opacity: 0 },
    { y: 0, opacity: 1, duration: 0.5, ease: "power3.out" }, start + 0.2);

  // The wheel: three candidate ticks, then the payoff snap. Each word is 25%
  // of the wheel column; ticks are committed inOut steps (never a blur), the
  // payoff lands on seqSettle — overshoot-free arrival (house style).
  var tick = 0.3;
  tl.set(wheelSel, { yPercent: 0 }, start);
  tl.to(wheelSel, { yPercent: -25, duration: tick, ease: "power2.inOut" }, settle - 1.42);
  tl.to(wheelSel, { yPercent: -50, duration: tick, ease: "power2.inOut" }, settle - 0.96);
  tl.to(wheelSel, { yPercent: -75, duration: 0.4, ease: "seqSettle" }, settle - 0.4);

  // Acknowledgment: underline draws, glow breathes once and releases.
  tl.fromTo(ruleSel, { scaleX: 0 }, { scaleX: 1, duration: 0.45, ease: "power2.inOut" }, settle + 0.05);
  tl.fromTo(glowSel, { opacity: 0 }, { opacity: 0.5, duration: 0.3, ease: "power2.out" }, settle);
  tl.to(glowSel, { opacity: 0.22, duration: 0.6, ease: "power2.inOut" }, settle + 0.3);
</script>
