<template data-recipe-doc>
# last-word-roulette — locked sentence, final-word wheel, payoff snap

**What it is.** A hero headline whose sentence is locked while its final word
is a masked vertical roulette: the candidate words spin past twice in quick,
committed ticks that ease off, then the payoff word snaps in on a settle ease
with a small slot pop, an accent underline draws beneath it, and a soft glow
acknowledges the landing before releasing. The spin occupies ~1.3s before the
payoff locks at `settleSec`.

**When to declare it.** The brief positions the product against alternatives,
cycles through options, or builds to one decisive word — "everything becomes
___", "stop guessing, start ___", pricing/persona/verb roulettes, hook shots
that need a typographic signature, or a resolve shot that lands the thesis
word. The payoff landing is a natural PRIMARY moment: place a declared moment
at roughly `sceneStart + settleSec` with motionIntent "type-on" or "resolve".

**How to stage the shot around it.**
- Give the wheel its focal window: no competing motion from `settleSec - 1.5`
  until ~1s after the payoff (the pattern owns the eye through the snap).
- The sentence reads best as the scene's hero copy on a calm or slowly
  drifting camera; a whip INTO the scene works, a whip away before the payoff
  has ~1s of reading room does not.
- Pair naturally: a `timeRamp` dip at the payoff, a `gradeShift` warming at
  the landing, or a cut whose continuity anchor is the underlined word.
- The candidates should escalate toward the payoff (weakest first); keep all
  four words in one register (verbs with verbs, nouns with nouns).

**Slots.** `lead` (the locked sentence prefix), `word1..word3` (the candidate
ticks), `payoff` (the word that stays), `accent` (a `var(--…)` brand token for
the wheel/underline/glow), `settleSec` (seconds after scene start when the
payoff locks — leave ≥1s of scene after it).

<script data-recipe-motion>
  // Timing spine: {{start}}/{{settleSec}} fill as numeric literals, so `settle`
  // and every position below constant-fold in the static GSAP parser — the
  // whole gesture is placeable at lint time (no phantom-overlap warnings) and
  // identical at runtime. Selectors are inline string literals for the same
  // reason: the linter resolves literals, never concatenations.
  var settle = {{start}} + {{settleSec}};

  // Entrance: the locked sentence rises in as one object.
  tl.fromTo('[data-part="{{uid}}-roulette"]', { y: 24, opacity: 0 },
    { y: 0, opacity: 1, duration: 0.45, ease: "power3.out" }, {{start}} + 0.15);

  // The wheel is a 7-row strip (candidates twice, then the payoff), so the
  // spin reads as a real roulette: five quick committed ticks that ease off,
  // then the payoff lands on seqSettle — overshoot-free arrival (house style).
  // One row is 100/7% of the strip.
  tl.set('[data-part="{{uid}}-wheel"]', { yPercent: 0 }, {{start}});
  tl.to('[data-part="{{uid}}-wheel"]', { yPercent: -100 * 1 / 7, duration: 0.13, ease: "power1.in" }, settle - 1.30);
  tl.to('[data-part="{{uid}}-wheel"]', { yPercent: -100 * 2 / 7, duration: 0.12, ease: "power1.inOut" }, settle - 1.12);
  tl.to('[data-part="{{uid}}-wheel"]', { yPercent: -100 * 3 / 7, duration: 0.12, ease: "power1.inOut" }, settle - 0.95);
  tl.to('[data-part="{{uid}}-wheel"]', { yPercent: -100 * 4 / 7, duration: 0.12, ease: "power1.inOut" }, settle - 0.78);
  tl.to('[data-part="{{uid}}-wheel"]', { yPercent: -100 * 5 / 7, duration: 0.13, ease: "power1.out" }, settle - 0.60);
  tl.to('[data-part="{{uid}}-wheel"]', { yPercent: -100 * 6 / 7, duration: 0.38, ease: "seqSettle" }, settle - 0.38);

  // Landing impact: the slot pops once (committed, no wobble)…
  tl.fromTo('[data-part="{{uid}}-roulette"] .rcp-slot', { scale: 1 },
    { scale: 1.035, duration: 0.12, ease: "power2.out" }, settle - 0.05);
  tl.to('[data-part="{{uid}}-roulette"] .rcp-slot', { scale: 1, duration: 0.28, ease: "seqSettle" }, settle + 0.09);

  // …the underline draws fast, and the glow breathes once and releases.
  tl.fromTo('[data-part="{{uid}}-roulette"] .rcp-rule', { scaleX: 0 },
    { scaleX: 1, duration: 0.32, ease: "power3.out" }, settle + 0.02);
  tl.fromTo('[data-part="{{uid}}-roulette"] .rcp-glow', { opacity: 0 },
    { opacity: 0.5, duration: 0.22, ease: "power2.out" }, settle - 0.02);
  tl.to('[data-part="{{uid}}-roulette"] .rcp-glow', { opacity: 0.18, duration: 0.5, ease: "power2.inOut" }, settle + 0.24);
</script>
