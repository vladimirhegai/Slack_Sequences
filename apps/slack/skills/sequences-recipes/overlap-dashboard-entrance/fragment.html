  .rcp-dash .rcp-dash-nav-icon {
    width: 18px;

  .rcp-dash .rcp-dash-main {

  .rcp-dash .rcp-dash-heading {

  .rcp-dash .rcp-dash-period {

    color: rgba(245, 247, 250, 0.54);

    display: grid;

    margin-top: 32px;
  }
  .rcp-dash .rcp-dash-card {
    min-height: 145px;

  .rcp-dash .rcp-dash-avatar {

  .rcp-dash .rcp-dash-activity-time {

<template data-recipe-markup>

  </div>
</template>
<script data-recipe-motion>
  var settle = {{start}} + {{settleSec}};

  // Coherent assemble-from-baseline family. Starts are 70–100ms apart while
  // durations are 450–650ms, so the dashboard arrives as one overlapping
  // phrase rather than a row of completed mini-animations.
  // The shell is intentionally painted at scene start: hiding the whole
  // product until its first tween would expose the host wallpaper as a blank
  // cold-open frame. Geometry rises, while the chrome stays readable.
  tl.fromTo('[data-part="{{uid}}-dashboard"]', { y: 28, scale: 0.98 },
    { y: 0, scale: 1, duration: 0.62, ease: "power3.out" }, {{start}});
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-top', { y: -14, opacity: 0.72 },
    { y: 0, opacity: 1, duration: 0.48, ease: "power3.out" }, {{start}} + 0.08);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-nav', { x: -22, opacity: 0.5 },
    { x: 0, opacity: 1, duration: 0.52, ease: "power3.out" }, {{start}} + 0.29);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-nav-item', { x: -12, opacity: 0 },
    { x: 0, opacity: 1, duration: 0.34, stagger: 0.055, ease: "power3.out" }, {{start}} + 0.38);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-heading', { y: 18, opacity: 0.62 },
    { y: 0, opacity: 1, duration: 0.46, ease: "power3.out" }, {{start}} + 0.37);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-card-1', { y: 32, scale: 0.94, opacity: 0 },
    { y: -5, scale: 1.018, opacity: 1, duration: 0.44, ease: "power4.out" }, {{start}} + 0.43);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-card-2', { y: 32, scale: 0.94, opacity: 0 },
    { y: -5, scale: 1.018, opacity: 1, duration: 0.46, ease: "power4.out" }, {{start}} + 0.5);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-card-3', { y: 32, scale: 0.94, opacity: 0 },
    { y: -5, scale: 1.018, opacity: 1, duration: 0.48, ease: "power4.out" }, {{start}} + 0.57);
  tl.to('[data-part="{{uid}}-dashboard"] .rcp-dash-card',
    { y: 0, scale: 1, duration: 0.26, stagger: 0.055, ease: "seqSettle" }, {{start}} + 0.9);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-chart', { y: 24, opacity: 0 },
    { y: 0, opacity: 1, duration: 0.58, ease: "seqSettle" }, {{start}} + 0.70);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-activity', { y: 24, opacity: 0 },
    { y: 0, opacity: 1, duration: 0.6, ease: "seqSettle" }, {{start}} + 0.79);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-activity-row', { x: 14, opacity: 0 },
    { x: 0, opacity: 1, duration: 0.34, stagger: 0.07, ease: "power3.out" }, {{start}} + 0.98);

  // Development after entrance: the chart grows in a tight follower chain,
  // then the live status acknowledges the landed dashboard once.
  tl.fromTo('[data-part="{{uid}}-chart"] .rcp-dash-bar', { scaleY: 0 },
    { scaleY: 1.08, duration: 0.42, stagger: 0.055, ease: "power4.out" }, settle - 0.74);
  tl.to('[data-part="{{uid}}-chart"] .rcp-dash-bar',
    { scaleY: 1, duration: 0.2, stagger: 0.055, ease: "seqSettle" }, settle - 0.18);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-live-dot', { scale: 0.6, opacity: 0.45 },
    { scale: 1.35, opacity: 1, duration: 0.18, ease: "power2.out" }, settle + 0.04);
  tl.to('[data-part="{{uid}}-dashboard"] .rcp-dash-live-dot',
    { scale: 1, duration: 0.3, ease: "seqSettle" }, settle + 0.23);
  tl.fromTo('[data-part="{{uid}}-dashboard"] .rcp-dash-live-ring', { scale: 0.4, opacity: 0 },
    { scale: 1.65, opacity: 0.55, duration: 0.34, ease: "power3.out", immediateRender: false }, settle + 0.03);
  tl.to('[data-part="{{uid}}-dashboard"] .rcp-dash-live-ring',
    { scale: 2.05, opacity: 0, duration: 0.24, ease: "power2.out" }, settle + 0.37);
</script>
