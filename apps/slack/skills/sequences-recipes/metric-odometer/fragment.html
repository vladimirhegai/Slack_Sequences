<!--
  metric-odometer — the KPI-payoff signature (agent-authored recipe).

  Instantiation contract (host-owned — see recipeContract.ts): markup template
  injected inside the declared scene with {{param}} slots filled; style
  injected once into <head>; the motion body runs as (tl, root, start,
  duration, uid) adding tweens to the ONE paused master timeline. Pure
  function of timeline time — no clocks, no rAF, no randomness, no repeats.

  Mechanism: the markup ships six pre-built columns, each a masked 20-line
  digit strip (0-9 twice, so every roll travels at least a full cycle and no
  column sits dead). A load-time pass distributes {{value}}'s characters
  across the columns — digit chars keep their strip, separator chars swap to
  a printed literal, unused columns hide. This runs once at document parse
  (before any seek), so it is a pure function of the source: deterministic by
  construction.

  Static-analyzability convention (keeps the lint gate warning-free): tween
  targets are INLINE STRING LITERALS with {{uid}} filled by the host, and the
  timing spine derives from {{start}}/{{settleSec}} numeric literal slots so
  every position constant-folds in the pinned GSAP parser. Roll TARGET VALUES
  are runtime-computed from {{value}} — values never affect lint placement.
-->
<style data-recipe-style>
  .rcp-odo {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 30px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }
  .rcp-odo .rcp-odo-numwrap {
    position: relative;
    display: inline-block;
    will-change: transform;
  }
  .rcp-odo .rcp-odo-row {
    display: block;
    white-space: nowrap;
    font-size: var(--rcp-size, 168px);
    font-weight: var(--rcp-weight, 800);
    letter-spacing: -0.01em;
    line-height: 1.04;
  }
  .rcp-odo .rcp-odo-fix {
    display: inline-block;
    vertical-align: bottom;
    color: var(--rcp-accent, #ffc24d);
  }
  .rcp-odo .rcp-odo-cell {
    display: inline-block;
    vertical-align: bottom;
    overflow: hidden;
    height: 1.04em;
  }
  .rcp-odo .rcp-odo-strip {
    display: block;
    will-change: transform;
  }
  .rcp-odo .rcp-odo-lit {
    display: inline-block;
  }
  .rcp-odo .rcp-odo-rule {
    display: block;
    position: absolute;
    left: 2%;
    right: 2%;
    top: calc(100% + 0.06em);
    height: 0.05em;
    border-radius: 999px;
    background: var(--rcp-accent, #ffc24d);
    transform: scaleX(0);
    transform-origin: 50% 50%;
    font-size: var(--rcp-size, 168px);
  }
  .rcp-odo .rcp-odo-glow {
    position: absolute;
    left: 50%;
    top: 50%;
    width: 9em;
    height: 3.4em;
    margin-left: -4.5em;
    margin-top: -1.7em;
    border-radius: 50%;
    background: radial-gradient(closest-side, var(--rcp-accent, #ffc24d), transparent 72%);
    opacity: 0;
    pointer-events: none;
    filter: blur(16px);
    font-size: var(--rcp-size, 168px);
  }
  .rcp-odo .rcp-odo-label {
    font-size: var(--rcp-label-size, 28px);
    font-weight: 600;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    opacity: 0.78;
  }
</style>
<template data-recipe-markup>
  <div class="rcp-odo" data-part="{{uid}}-odometer" data-layout-important
    data-layout-anchor="frame:center" style="--rcp-accent: {{accent}}">
    <span class="rcp-odo-numwrap">
      <span class="rcp-odo-glow" data-layout-ignore></span>
      <!-- Cells sit adjacent with NO inter-element whitespace: at hero font
           sizes a stray text node between inline-blocks renders as a huge
           gap between digits. -->
      <span class="rcp-odo-row"><span class="rcp-odo-fix">{{prefix}}</span><span class="rcp-odo-cell" data-part="{{uid}}-odo-0"><span class="rcp-odo-strip">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9</span><span class="rcp-odo-lit"></span></span><span class="rcp-odo-cell" data-part="{{uid}}-odo-1"><span class="rcp-odo-strip">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9</span><span class="rcp-odo-lit"></span></span><span class="rcp-odo-cell" data-part="{{uid}}-odo-2"><span class="rcp-odo-strip">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9</span><span class="rcp-odo-lit"></span></span><span class="rcp-odo-cell" data-part="{{uid}}-odo-3"><span class="rcp-odo-strip">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9</span><span class="rcp-odo-lit"></span></span><span class="rcp-odo-cell" data-part="{{uid}}-odo-4"><span class="rcp-odo-strip">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9</span><span class="rcp-odo-lit"></span></span><span class="rcp-odo-cell" data-part="{{uid}}-odo-5"><span class="rcp-odo-strip">0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9<br>0<br>1<br>2<br>3<br>4<br>5<br>6<br>7<br>8<br>9</span><span class="rcp-odo-lit"></span></span><span class="rcp-odo-fix">{{suffix}}</span></span>
      <span class="rcp-odo-rule" data-layout-ignore></span>
    </span>
    <div class="rcp-odo-label">{{label}}</div>
  </div>
</template>
<script data-recipe-motion>
  // Load-time column distribution: runs once at document parse, before any
  // seek — a pure function of {{value}}. Digit chars keep their strip,
  // separators print, unused columns hide.
  var cells = document.querySelectorAll('[data-part="{{uid}}-odometer"] .rcp-odo-cell');
  for (var i = 0; i < cells.length; i++) {
    var ch = "{{value}}".charAt(i);
    var strip = cells[i].querySelector(".rcp-odo-strip");
    var lit = cells[i].querySelector(".rcp-odo-lit");
    if (!ch) { cells[i].style.display = "none"; }
    else if (ch >= "0" && ch <= "9") { lit.style.display = "none"; }
    else { strip.style.display = "none"; lit.textContent = ch; }
  }

  // Roll targets: each strip is 20 lines (0-9 twice), one line = 5% of strip
  // height; a digit d lands on its second copy at yPercent -5*(10+d), so
  // every live column travels at least one full cycle. Non-digit columns
  // resolve to 0 (their strip is hidden anyway).
  var c0 = "{{value}}".charCodeAt(0); var y0 = (c0 >= 48 && c0 <= 57) ? (-5 * (c0 - 38)) : 0;
  var c1 = "{{value}}".charCodeAt(1); var y1 = (c1 >= 48 && c1 <= 57) ? (-5 * (c1 - 38)) : 0;
  var c2 = "{{value}}".charCodeAt(2); var y2 = (c2 >= 48 && c2 <= 57) ? (-5 * (c2 - 38)) : 0;
  var c3 = "{{value}}".charCodeAt(3); var y3 = (c3 >= 48 && c3 <= 57) ? (-5 * (c3 - 38)) : 0;
  var c4 = "{{value}}".charCodeAt(4); var y4 = (c4 >= 48 && c4 <= 57) ? (-5 * (c4 - 38)) : 0;
  var c5 = "{{value}}".charCodeAt(5); var y5 = (c5 >= 48 && c5 <= 57) ? (-5 * (c5 - 38)) : 0;

  // Timing spine: {{start}}/{{settleSec}} are numeric literals, so every
  // position below constant-folds at parse time (lint-placeable, identical
  // at runtime). settle = the last column's lock.
  var settle = {{start}} + {{settleSec}};

  // Entrance: the whole metric block rises as one object (label included, so
  // the claim has context while the digits roll).
  tl.fromTo('[data-part="{{uid}}-odometer"]', { y: 26, opacity: 0 },
    { y: 0, opacity: 1, duration: 0.45, ease: "power3.out" }, {{start}} + 0.15);

  // The roll: all columns spin together, decelerating on seqSettle, landing
  // in a left-to-right wave (each column starts a touch later and rolls a
  // touch longer than its left neighbor).
  tl.fromTo('[data-part="{{uid}}-odo-0"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y0, duration: 0.95, ease: "seqSettle" }, settle - 1.20);
  tl.fromTo('[data-part="{{uid}}-odo-1"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y1, duration: 0.97, ease: "seqSettle" }, settle - 1.17);
  tl.fromTo('[data-part="{{uid}}-odo-2"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y2, duration: 0.99, ease: "seqSettle" }, settle - 1.14);
  tl.fromTo('[data-part="{{uid}}-odo-3"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y3, duration: 1.01, ease: "seqSettle" }, settle - 1.11);
  tl.fromTo('[data-part="{{uid}}-odo-4"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y4, duration: 1.03, ease: "seqSettle" }, settle - 1.08);
  tl.fromTo('[data-part="{{uid}}-odo-5"] .rcp-odo-strip', { yPercent: 0 }, { yPercent: y5, duration: 1.05, ease: "seqSettle" }, settle - 1.05);

  // Lock acknowledgment: one committed pop, underline sweep, glow release.
  tl.fromTo('[data-part="{{uid}}-odometer"] .rcp-odo-numwrap', { scale: 1 },
    { scale: 1.02, duration: 0.12, ease: "power2.out" }, settle - 0.03);
  tl.to('[data-part="{{uid}}-odometer"] .rcp-odo-numwrap', { scale: 1, duration: 0.28, ease: "seqSettle" }, settle + 0.11);
  tl.fromTo('[data-part="{{uid}}-odometer"] .rcp-odo-rule', { scaleX: 0 },
    { scaleX: 1, duration: 0.32, ease: "power3.out" }, settle + 0.04);
  tl.fromTo('[data-part="{{uid}}-odometer"] .rcp-odo-glow', { opacity: 0 },
    { opacity: 0.45, duration: 0.22, ease: "power2.out" }, settle - 0.02);
  tl.to('[data-part="{{uid}}-odometer"] .rcp-odo-glow', { opacity: 0.16, duration: 0.5, ease: "power2.inOut" }, settle + 0.24);
</script>
